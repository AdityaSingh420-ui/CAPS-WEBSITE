<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resilience Assessment Portal</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">


<div class="hero">

    <h3>
        Centre for Academic and Professional Support
    </h3>

    <h1>
        Resilience Assessment Portal
    </h1>

    <p>
        CHRIST (Deemed to be University)
    </p>

    <p class="subtitle">
        Evaluate your resilience level through a structured
        psychometric assessment.
    </p>

</div>

<div class="card">

    <form id="assessmentForm">

        <div class="input-group">

            <label>Full Name</label>

            <input
                type="text"
                id="name"
                placeholder="Enter your name"
                required>

        </div>

        <div class="input-group">

            <label>Email Address</label>

            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required>

        </div>

        <div id="questions"></div>

        <button type="submit">
            Submit Assessment
        </button>

    </form>

    <div id="result"></div>

</div>


</div>

<script src="script.js"></script>

</body>
</html>
